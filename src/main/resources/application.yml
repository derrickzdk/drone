server:
  port: 13131

spring:
  datasource:
    # todo 用的时候要改
    url: jdbc:mysql://10.3.1.10:3306/drone_location?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root # todo 用的时候要改
    password: 3TRjUcQe.$w#K # todo 用的时候要改
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  mybatis-plus:
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    global-config:
      db-config:
        id-type: auto
        logic-delete-field: deleted
        logic-delete-value: 1
    mapper-locations: classpath:mapper
    type-aliases-package: com.xzhl.dronelocation.entity

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

kafka:
  # dev
  bootstrap-servers: 10.3.0.70:9092 # todo 用的时候要改
  # prod
  # bootstrap-servers: 10.8.100.23:9092
  topic:
    drone-location: hxs_uav_fly_data # todo 用的时候要改
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.apache.kafka.common.serialization.StringSerializer
    acks: all
    retries: 3
    batch-size: 16384
    linger-ms: 0
    buffer-memory: 33554432

logging:
  level:
    root: INFO
    com.xzhl.dronelocation: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/drone-location.log
    max-size: 10MB
    max-history: 30
