<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/single-point">
                            <i class="fas fa-map-marker-alt"></i> 单点位推送
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/route-generation">
                            <i class="fas fa-route"></i> 航线生成
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/task-execution">
                            <i class="fas fa-play-circle"></i> 任务执行
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/auto-route">
                            <i class="fas fa-magic"></i> 自动航线
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/task-list">
                            <i class="fas fa-list"></i> 任务列表
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="card animate-fade-in">
                    <div class="card-header">
                        <i class="fas fa-cog"></i> 配置参数
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <label class="form-label">无人机SN码</label>
                                <input type="text" class="form-control" id="droneSn" value="DRONE001">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">飞行高度 (米)</label>
                                <input type="number" class="form-control" id="altitude" value="100">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">飞行速度 (m/s)</label>
                                <input type="number" class="form-control" id="speed" value="10">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">航点间距 (米)</label>
                                <input type="number" class="form-control" id="spacing" value="50">
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-6">
                                <label class="form-label">航线模式</label>
                                <select class="form-select" id="patternType">
                                    <option value="GRID">蛇形航线 (Grid)</option>
                                    <option value="SPIRAL">螺旋形航线 (Spiral)</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">任务名称</label>
                                <input type="text" class="form-control" id="taskName" value="自动航线任务">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card animate-slide-up">
                    <div class="card-header">
                        <i class="fas fa-map"></i> 地图 - 在地图上框选区域
                    </div>
                    <div class="card-body">
                        <div id="map"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card animate-slide-up" style="animation-delay: 0.1s;">
                    <div class="card-header">
                        <i class="fas fa-magic"></i> 生成航线
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <button class="btn btn-primary w-100" onclick="generateRoute()">
                                    <i class="fas fa-magic"></i> 一键生成航线
                                </button>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-success w-100" onclick="exportRoute()">
                                    <i class="fas fa-download"></i> 导出航线
                                </button>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-info w-100" onclick="saveTask()">
                                    <i class="fas fa-save"></i> 保存任务
                                </button>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-warning w-100" onclick="clearRoute()">
                                    <i class="fas fa-trash"></i> 清除航线
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card animate-slide-up" style="animation-delay: 0.2s;">
                    <div class="card-header">
                        <i class="fas fa-info-circle"></i> 航线信息
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <div class="stats-card">
                                    <div class="stats-number" id="waypointCount">0</div>
                                    <div class="stats-label">航点数量</div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stats-card">
                                    <div class="stats-number" id="estimatedDistance">0</div>
                                    <div class="stats-label">预估距离 (米)</div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stats-card">
                                    <div class="stats-number" id="estimatedTime">0</div>
                                    <div class="stats-label">预估时间 (分钟)</div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stats-card">
                                    <div class="stats-number" id="patternTypeDisplay">-</div>
                                    <div class="stats-label">航线模式</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 海心沙无人机位置推送系统. Designed by Derrick.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script>
        $(document).ready(function() {
            var map = L.map('map').setView([23.1125, 113.3245], 15);
            
            L.tileLayer('https://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                attribution: '&copy; 高德地图'
            }).addTo(map);
            
            var waypoints = [];
            var markers = L.layerGroup().addTo(map);
            var polyline = null;
            var drawnItems = L.featureGroup().addTo(map);
            
            var drawControl = new L.Control.Draw({
                draw: {
                    polygon: {
                        allowIntersection: false,
                        showArea: true
                    },
                    rectangle: {
                        shapeOptions: {
                            color: '#06b6d4'
                        }
                    },
                    circle: false,
                    circlemarker: false,
                    polyline: false,
                    marker: false
                },
                edit: {
                    featureGroup: drawnItems,
                    remove: true
                }
            });
            
            map.addControl(drawControl);
            
            map.on(L.Draw.Event.CREATED, function(e) {
                var layer = e.layer;
                drawnItems.addLayer(layer);
                
                if (e.layerType === 'polygon' || e.layerType === 'rectangle') {
                    var latlngs = layer.getLatLngs()[0];
                    generateAutoRoute(latlngs);
                }
            });

            function generateAutoRoute(latlngs) {
                var patternType = $('#patternType').val();
                var spacing = parseFloat($('#spacing').val());
                var altitude = parseFloat($('#altitude').val());
                var speed = parseFloat($('#speed').val());
                
                waypoints = [];
                
                if (patternType === 'GRID') {
                    waypoints = generateGridRoute(latlngs, spacing, altitude, speed);
                } else if (patternType === 'SPIRAL') {
                    waypoints = generateSpiralRoute(latlngs, spacing, altitude, speed);
                }
                
                displayRoute();
                updateStats();
            }

            function generateGridRoute(latlngs, spacing, altitude, speed) {
                var route = [];
                var bounds = L.latLngBounds(latlngs);
                var minLat = bounds.getSouth();
                var maxLat = bounds.getNorth();
                var minLng = bounds.getWest();
                var maxLng = bounds.getEast();
                
                var latStep = spacing / 111000;
                var lngStep = spacing / (111000 * Math.cos(minLat * Math.PI / 180));
                
                var goRight = true;
                for (var lat = minLat; lat <= maxLat; lat += latStep) {
                    if (goRight) {
                        for (var lng = minLng; lng <= maxLng; lng += lngStep) {
                            route.push({
                                lat: lat,
                                lng: lng,
                                altitude: altitude,
                                speed: speed
                            });
                        }
                    } else {
                        for (var lng = maxLng; lng >= minLng; lng -= lngStep) {
                            route.push({
                                lat: lat,
                                lng: lng,
                                altitude: altitude,
                                speed: speed
                            });
                        }
                    }
                    goRight = !goRight;
                }
                
                return route;
            }

            function generateSpiralRoute(latlngs, spacing, altitude, speed) {
                var route = [];
                var bounds = L.latLngBounds(latlngs);
                var center = bounds.getCenter();
                var maxRadius = Math.max(
                    bounds.getNorth() - bounds.getSouth(),
                    bounds.getEast() - bounds.getWest()
                ) / 2;
                
                var currentRadius = 0;
                var angle = 0;
                var radiusStep = spacing / 111000;
                var angleStep = 0.1;
                
                while (currentRadius < maxRadius) {
                    var lat = center.lat + currentRadius * Math.cos(angle);
                    var lng = center.lng + currentRadius * Math.sin(angle);
                    
                    route.push({
                        lat: lat,
                        lng: lng,
                        altitude: altitude,
                        speed: speed
                    });
                    
                    currentRadius += radiusStep * angleStep;
                    angle += angleStep;
                }
                
                return route;
            }

            function displayRoute() {
                markers.clearLayers();
                if (polyline) {
                    map.removeLayer(polyline);
                }
                
                waypoints.forEach(function(wp, index) {
                    var waypointIcon = L.divIcon({
                        className: 'waypoint-marker',
                        iconSize: [18, 18],
                        iconAnchor: [9, 9]
                    });
                    
                    var marker = L.marker([wp.lat, wp.lng], { icon: waypointIcon }).addTo(map);
                    markers.addLayer(marker);
                    
                    marker.bindPopup('<b>航点 ' + (index + 1) + '</b><br>' +
                                    '纬度: ' + wp.lat.toFixed(8) + '<br>' +
                                    '经度: ' + wp.lng.toFixed(8) + '<br>' +
                                    '高度: ' + wp.altitude + 'm<br>' +
                                    '速度: ' + wp.speed + 'm/s');
                });
                
                if (waypoints.length > 1) {
                    var latlngs = waypoints.map(function(wp) {
                        return [wp.lat, wp.lng];
                    });
                    
                    polyline = L.polyline(latlngs, {
                        color: '#06b6d4',
                        weight: 3,
                        opacity: 0.8,
                        dashArray: '10, 5'
                    }).addTo(map);
                }
            }

            function updateStats() {
                $('#waypointCount').text(waypoints.length);
                $('#patternTypeDisplay').text($('#patternType').val());
                
                if (waypoints.length > 1) {
                    var totalDistance = 0;
                    for (var i = 0; i < waypoints.length - 1; i++) {
                        var lat1 = waypoints[i].lat;
                        var lng1 = waypoints[i].lng;
                        var lat2 = waypoints[i + 1].lat;
                        var lng2 = waypoints[i + 1].lng;
                        
                        var R = 6371000;
                        var dLat = (lat2 - lat1) * Math.PI / 180;
                        var dLng = (lng2 - lng1) * Math.PI / 180;
                        var a = Math.sin(dLat / 2) * Math.sin(dLng / 2);
                        var c = Math.cos(dLat / 2) * Math.cos(dLng / 2);
                        var d = Math.sqrt((1 - c) * (1 - c));
                        totalDistance += R * d;
                    }
                    
                    $('#estimatedDistance').text(Math.round(totalDistance));
                    
                    var speed = parseFloat($('#speed').val());
                    var estimatedTime = totalDistance / (speed * 60);
                    $('#estimatedTime').text(estimatedTime.toFixed(1));
                }
            }

            window.generateRoute = function() {
                alert('请在地图上绘制一个矩形或多边形区域！');
            };

            window.exportRoute = function() {
                if (waypoints.length === 0) {
                    alert('请先生成航线！');
                    return;
                }
                
                var routeData = {
                    taskName: $('#taskName').val(),
                    droneSn: $('#droneSn').val(),
                    altitude: parseFloat($('#altitude').val()),
                    speed: parseFloat($('#speed').val()),
                    waypoints: waypoints
                };
                
                var dataStr = JSON.stringify(routeData, null, 2);
                var dataBlob = new Blob([dataStr], { type: 'application/json' });
                var url = URL.createObjectURL(dataBlob);
                var link = document.createElement('a');
                link.href = url;
                link.download = 'auto_route_' + new Date().getTime() + '.json';
                link.click();
            };

            window.saveTask = function() {
                if (waypoints.length === 0) {
                    alert('请先生成航线！');
                    return;
                }
                
                var taskData = {
                    taskName: $('#taskName').val(),
                    droneSn: $('#droneSn').val(),
                    altitude: parseFloat($('#altitude').val()),
                    speed: parseFloat($('#speed').val()),
                    waypoints: waypoints
                };
                
                $.ajax({
                    url: '/api/task/save',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(taskData),
                    success: function(response) {
                        alert('任务保存成功！');
                    },
                    error: function(xhr, status, error) {
                        alert('保存失败: ' + error);
                    }
                });
            };

            window.clearRoute = function() {
                if (waypoints.length === 0) {
                    return;
                }
                
                if (confirm('确定要清除航线吗？')) {
                    waypoints = [];
                    markers.clearLayers();
                    drawnItems.clearLayers();
                    if (polyline) {
                        map.removeLayer(polyline);
                        polyline = null;
                    }
                    updateStats();
                }
            };
        });
    </script>
</body>
</html>
