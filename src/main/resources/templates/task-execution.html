<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务执行 - 无人机位置推送系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-drone"></i> 无人机位置推送系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/single-point">
                            <i class="fas fa-map-marker-alt"></i> 单点位推送
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/route-generation">
                            <i class="fas fa-route"></i> 航线生成
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/task-execution">
                            <i class="fas fa-play-circle"></i> 任务执行
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/auto-route">
                            <i class="fas fa-magic"></i> 自动航线
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/task-list">
                            <i class="fas fa-list"></i> 任务列表
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="card animate-fade-in">
                    <div class="card-header">
                        <i class="fas fa-tasks"></i> 选择任务
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-8">
                                <select class="form-select" id="taskSelect">
                                    <option value="">请选择任务...</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-success w-100" onclick="loadTaskRoute()">
                                    <i class="fas fa-download"></i> 加载任务航线
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card animate-fade-in">
                    <div class="card-header">
                        <i class="fas fa-upload"></i> 上传航线文件
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <input type="file" class="form-control" id="routeFile" accept=".json">
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-primary w-100" onclick="loadRouteFile()">
                                    <i class="fas fa-file-upload"></i> 加载航线
                                </button>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-secondary w-100" onclick="clearRoute()">
                                    <i class="fas fa-trash"></i> 清除航线
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card animate-slide-up">
                    <div class="card-header">
                        <i class="fas fa-map"></i> 地图预览
                    </div>
                    <div class="card-body">
                        <div id="map"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card animate-slide-up" style="animation-delay: 0.1s;">
                    <div class="card-header">
                        <i class="fas fa-play-circle"></i> 任务控制
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4">
                                <button class="btn btn-success w-100" id="startBtn" onclick="startExecution()" disabled>
                                    <i class="fas fa-play"></i> 开始执行
                                </button>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-danger w-100" id="stopBtn" onclick="stopExecution()" disabled>
                                    <i class="fas fa-stop"></i> 停止执行
                                </button>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-warning w-100" onclick="saveAsTask()">
                                    <i class="fas fa-save"></i> 保存为任务
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card animate-slide-up" style="animation-delay: 0.2s;">
                    <div class="card-header">
                        <i class="fas fa-tachometer-alt"></i> 执行状态
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <div class="stats-card">
                                    <div class="stats-number" id="totalWaypoints">0</div>
                                    <div class="stats-label">总航点数</div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stats-card">
                                    <div class="stats-number" id="currentIndex">0</div>
                                    <div class="stats-label">当前航点</div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stats-card">
                                    <div class="stats-number" id="loopCount">0</div>
                                    <div class="stats-label">循环轮数</div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="progress mt-3">
                                    <div class="progress-bar" id="progressBar" role="progressbar" style="width: 0%">0%</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 海心沙无人机位置推送系统. Designed by Derrick.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="/static/js/map-utils.js"></script>
    <script src="/static/js/task-execution.js"></script>
</body>
</html>
