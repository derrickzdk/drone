<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务执行 - 无人机位置推送系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-drone"></i> 无人机位置推送系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/single-point">
                            <i class="fas fa-map-marker-alt"></i> 单点位推送
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/route-generation">
                            <i class="fas fa-route"></i> 航线生成
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/task-execution">
                            <i class="fas fa-play-circle"></i> 任务执行
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/auto-route">
                            <i class="fas fa-magic"></i> 自动航线
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/task-list">
                            <i class="fas fa-list"></i> 任务列表
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="card animate-fade-in">
                    <div class="card-header">
                        <i class="fas fa-upload"></i> 上传航线文件
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <input type="file" class="form-control" id="routeFile" accept=".json">
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-primary w-100" onclick="loadRouteFile()">
                                    <i class="fas fa-file-upload"></i> 加载航线
                                </button>
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-secondary w-100" onclick="clearRoute()">
                                    <i class="fas fa-trash"></i> 清除航线
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card animate-slide-up">
                    <div class="card-header">
                        <i class="fas fa-map"></i> 地图预览
                    </div>
                    <div class="card-body">
                        <div id="map"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card animate-slide-up" style="animation-delay: 0.1s;">
                    <div class="card-header">
                        <i class="fas fa-play-circle"></i> 任务控制
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4">
                                <button class="btn btn-success w-100" id="startBtn" onclick="startExecution()" disabled>
                                    <i class="fas fa-play"></i> 开始执行
                                </button>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-danger w-100" id="stopBtn" onclick="stopExecution()" disabled>
                                    <i class="fas fa-stop"></i> 停止执行
                                </button>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-warning w-100" onclick="saveAsTask()">
                                    <i class="fas fa-save"></i> 保存为任务
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="card animate-slide-up" style="animation-delay: 0.2s;">
                    <div class="card-header">
                        <i class="fas fa-tachometer-alt"></i> 执行状态
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <div class="stats-card">
                                    <div class="stats-number" id="totalWaypoints">0</div>
                                    <div class="stats-label">总航点数</div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stats-card">
                                    <div class="stats-number" id="currentIndex">0</div>
                                    <div class="stats-label">当前航点</div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="progress mt-3">
                                    <div class="progress-bar" id="progressBar" role="progressbar" style="width: 0%">0%</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2024 无人机位置推送系统. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script>
        $(document).ready(function() {
            var map = L.map('map').setView([39.9042, 116.4074], 10);
            
            L.tileLayer('https://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                attribution: '&copy; 高德地图'
            }).addTo(map);
            
            var waypoints = [];
            var markers = L.layerGroup().addTo(map);
            var polyline = null;
            var isExecuting = false;
            var currentIndex = 0;
            var executionInterval = null;

            $('#routeFile').change(function(e) {
                var file = e.target.files[0];
                if (!file) return;
                
                var reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        var data = JSON.parse(e.target.result);
                        if (data.waypoints && Array.isArray(data.waypoints)) {
                            waypoints = data.waypoints;
                            displayRoute();
                            $('#startBtn').prop('disabled', false);
                        } else {
                            alert('无效的航线文件格式！');
                        }
                    } catch (error) {
                        alert('文件解析失败：' + error);
                    }
                };
                reader.readAsText(file);
            });

            function displayRoute() {
                markers.clearLayers();
                if (polyline) {
                    map.removeLayer(polyline);
                }
                
                waypoints.forEach(function(wp, index) {
                    var waypointIcon = L.divIcon({
                        className: 'waypoint-marker',
                        iconSize: [18, 18],
                        iconAnchor: [9, 9]
                    });
                    
                    var marker = L.marker([wp.lat, wp.lng], { icon: waypointIcon }).addTo(map);
                    markers.addLayer(marker);
                    
                    marker.bindPopup('<b>航点 ' + (index + 1) + '</b><br>' +
                                    '纬度: ' + wp.lat.toFixed(8) + '<br>' +
                                    '经度: ' + wp.lng.toFixed(8) + '<br>' +
                                    '高度: ' + wp.altitude + 'm<br>' +
                                    '速度: ' + wp.speed + 'm/s');
                });
                
                if (waypoints.length > 1) {
                    var latlngs = waypoints.map(function(wp) {
                        return [wp.lat, wp.lng];
                    });
                    
                    polyline = L.polyline(latlngs, {
                        color: '#06b6d4',
                        weight: 3,
                        opacity: 0.8,
                        dashArray: '10, 5'
                    }).addTo(map);
                }
                
                $('#totalWaypoints').text(waypoints.length);
                $('#currentIndex').text(0);
                $('#progressBar').css('width', '0%').text('0%');
            }

            window.loadRouteFile = function() {
                $('#routeFile').click();
            };

            window.clearRoute = function() {
                if (waypoints.length === 0) {
                    return;
                }
                
                if (confirm('确定要清除航线吗？')) {
                    waypoints = [];
                    markers.clearLayers();
                    if (polyline) {
                        map.removeLayer(polyline);
                        polyline = null;
                    }
                    $('#startBtn').prop('disabled', true);
                    $('#stopBtn').prop('disabled', true);
                    displayRoute();
                }
            };

            window.startExecution = function() {
                if (waypoints.length === 0 || isExecuting) {
                    return;
                }
                
                isExecuting = true;
                currentIndex = 0;
                $('#startBtn').prop('disabled', true);
                $('#stopBtn').prop('disabled', false);
                
                executionInterval = setInterval(function() {
                    if (currentIndex >= waypoints.length) {
                        stopExecution();
                        alert('任务执行完成！');
                        return;
                    }
                    
                    var wp = waypoints[currentIndex];
                    
                    $.ajax({
                        url: '/api/location/send-simple',
                        method: 'POST',
                        data: {
                            sn: 'DRONE001',
                            lat: wp.lat,
                            lng: wp.lng,
                            altitude: wp.altitude,
                            speed: wp.speed
                        },
                        success: function(response) {
                            console.log('航点 ' + (currentIndex + 1) + ' 发送成功');
                        },
                        error: function(xhr, status, error) {
                            console.error('航点 ' + (currentIndex + 1) + ' 发送失败：' + error);
                        }
                    });
                    
                    currentIndex++;
                    updateProgress();
                }, 1000);
            };

            window.stopExecution = function() {
                if (!isExecuting) {
                    return;
                }
                
                isExecuting = false;
                if (executionInterval) {
                    clearInterval(executionInterval);
                    executionInterval = null;
                }
                
                $('#startBtn').prop('disabled', false);
                $('#stopBtn').prop('disabled', true);
            };

            window.saveAsTask = function() {
                if (waypoints.length === 0) {
                    alert('请先加载航线！');
                    return;
                }
                
                var taskData = {
                    taskName: '执行任务_' + new Date().getTime(),
                    droneSn: 'DRONE001',
                    altitude: waypoints[0].altitude,
                    speed: waypoints[0].speed,
                    waypoints: waypoints
                };
                
                $.ajax({
                    url: '/api/task/save',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(taskData),
                    success: function(response) {
                        alert('任务保存成功！');
                    },
                    error: function(xhr, status, error) {
                        alert('保存失败: ' + error);
                    }
                });
            };

            function updateProgress() {
                var progress = (currentIndex / waypoints.length) * 100;
                $('#currentIndex').text(currentIndex);
                $('#progressBar').css('width', progress + '%').text(progress.toFixed(1) + '%');
            }
        });
    </script>
</body>
</html>
